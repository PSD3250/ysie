<!DOCTYPE html>

    <script>

        (function () {
            const _filter = (args) => args[0] && typeof args[0] === 'string' && args[0].includes('cdn.tailwindcss.com');
            const _warn  = console.warn;  console.warn  = function (...a) { if (_filter(a)) return; _warn.apply(console, a); };
            const _log   = console.log;   console.log   = function (...a) { if (_filter(a)) return; _log.apply(console, a); };
            const _error = console.error; console.error = function (...a) { if (_filter(a)) return; _error.apply(console, a); };
        })();
    </script>

                    fontFamily: {

                        serif: ['Google Sans', 'Noto Sans KR', 'sans-serif'],
                        mono: ['Google Sans', 'Noto Sans KR', 'sans-serif'],

            <button onclick="changeMode('auth_master')"
